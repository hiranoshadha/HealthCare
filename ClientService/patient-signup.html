<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patient Registration — MediConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:       #0ea5e9;
      --primary-dark:  #0284c7;
      --secondary:     #06b6d4;
      --accent:        #8b5cf6;
      --success:       #10b981;
      --danger:        #ef4444;
      --warning:       #f59e0b;
      --bg:            #080f1a;
      --bg-card:       #0f1c2e;
      --bg-card2:      #162033;
      --border:        #1e3248;
      --border-light:  #243a52;
      --text:          #e8f4fd;
      --text-muted:    #7ea8c9;
      --text-dim:      #3d6080;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(14,165,233,.35);
    }

    .logo-name {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #e0f2ff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .logo-sub {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .form-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .form-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all .2s;
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,.12);
    }

    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all .2s;
      width: 100%;
    }

    .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,.12);
    }

    .btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 18px rgba(14,165,233,.3);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(14,165,233,.45);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-full {
      width: 100%;
      margin-top: 8px;
    }

    .links {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin: 0 12px;
      transition: color .2s;
    }

    .link:hover {
      color: var(--secondary);
    }

    .error-message {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message {
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.2);
      color: var(--success);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .spin {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rot .6s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes rot {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 10px;
      }
      .form-container {
        padding: 24px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-icon">🏥</div>
      <div class="logo-name">MediConnect</div>
      <div class="logo-sub">Patient Registration</div>
    </div>

    <div class="form-container">
      <div class="form-title">Create Your Patient Account</div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="patientForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="firstName">First Name *</label>
            <input type="text" id="firstName" name="firstName" class="form-input" placeholder="Enter first name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last Name *</label>
            <input type="text" id="lastName" name="lastName" class="form-input" placeholder="Enter last name" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="dateOfBirth">Date of Birth *</label>
            <input type="date" id="dateOfBirth" name="dateOfBirth" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="gender">Gender *</label>
            <select id="gender" name="gender" class="form-select" required>
              <option value="">Select gender</option>
              <option value="MALE">Male</option>
              <option value="FEMALE">Female</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="bloodGroup">Blood Group</label>
            <select id="bloodGroup" name="bloodGroup" class="form-select">
              <option value="">Select blood group</option>
              <option value="A+">A+</option>
              <option value="A-">A-</option>
              <option value="B+">B+</option>
              <option value="B-">B-</option>
              <option value="AB+">AB+</option>
              <option value="AB-">AB-</option>
              <option value="O+">O+</option>
              <option value="O-">O-</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="phoneNumber">Phone Number *</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" class="form-input" placeholder="Enter phone number" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email *</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="Enter email address" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="address">Address *</label>
          <textarea id="address" name="address" class="form-input form-textarea" placeholder="Enter your address" required></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="emergencyContactName">Emergency Contact Name</label>
            <input type="text" id="emergencyContactName" name="emergencyContactName" class="form-input" placeholder="Enter emergency contact name">
          </div>
          <div class="form-group">
            <label class="form-label" for="emergencyContactPhone">Emergency Contact Phone</label>
            <input type="tel" id="emergencyContactPhone" name="emergencyContactPhone" class="form-input" placeholder="Enter emergency contact phone">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="medicalNotes">Medical Notes</label>
          <textarea id="medicalNotes" name="medicalNotes" class="form-input form-textarea" placeholder="Any existing medical conditions or notes"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="username">Username *</label>
            <input type="text" id="username" name="username" class="form-input" placeholder="Choose a username" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password *</label>
            <input type="password" id="password" name="password" class="form-input" placeholder="Create a password" required>
          </div>
        </div>

        <button type="submit" id="registerBtn" class="btn btn-full">
          <span id="btnText">Create Account</span>
        </button>
      </form>

      <div class="links">
        <a href="login.html" class="link">Already have an account? Sign In</a>
      </div>
    </div>
  </div>

  <script>
    const API_USER = 'http://https://healthcare-7pwe.onrender.com';

    // Utility functions
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      successDiv.style.display = 'none';
    }

    function showSuccess(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      errorDiv.style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    function setLoading(loading) {
      const btn = document.getElementById('registerBtn');
      const btnText = document.getElementById('btnText');

      if (loading) {
        btn.disabled = true;
        btnText.innerHTML = '<span class="spin"></span>Creating Account...';
      } else {
        btn.disabled = false;
        btnText.textContent = 'Create Account';
      }
    }

    // Patient registration function
    async function registerPatient(patientData, password) {
      try {
        const response = await fetch(`${API_USER}/api/users/patients?password=${encodeURIComponent(password)}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(patientData)
        });

        const data = await response.json();

        if (response.ok) {
          showSuccess('Account created successfully! Redirecting to login...');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showError(data.message || 'Registration failed');
        }
      } catch (error) {
        showError('Network error. Please try again.');
        console.error('Registration error:', error);
      }
    }

    // Form submission
    document.getElementById('patientForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const formData = new FormData(e.target);
      const patientData = {
        firstName: formData.get('firstName').trim(),
        lastName: formData.get('lastName').trim(),
        dateOfBirth: formData.get('dateOfBirth'),
        gender: formData.get('gender'),
        bloodGroup: formData.get('bloodGroup') || null,
        address: formData.get('address').trim(),
        email: formData.get('email').trim(),
        phoneNumber: formData.get('phoneNumber').trim(),
        emergencyContactName: formData.get('emergencyContactName').trim() || null,
        emergencyContactPhone: formData.get('emergencyContactPhone').trim() || null,
        medicalNotes: formData.get('medicalNotes').trim() || null,
        username: formData.get('username').trim()
      };

      const password = formData.get('password');

      // Basic validation
      if (!patientData.firstName || !patientData.lastName || !patientData.dateOfBirth ||
          !patientData.gender || !patientData.address || !patientData.email ||
          !patientData.phoneNumber || !patientData.username || !password) {
        showError('Please fill in all required fields');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters long');
        return;
      }

      setLoading(true);
      await registerPatient(patientData, password);
      setLoading(false);
    });
  </script>
</body>
</html>
