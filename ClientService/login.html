<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — MediConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:       #0ea5e9;
      --primary-dark:  #0284c7;
      --secondary:     #06b6d4;
      --accent:        #8b5cf6;
      --success:       #10b981;
      --danger:        #ef4444;
      --warning:       #f59e0b;
      --bg:            #080f1a;
      --bg-card:       #0f1c2e;
      --bg-card2:      #162033;
      --border:        #1e3248;
      --border-light:  #243a52;
      --text:          #e8f4fd;
      --text-muted:    #7ea8c9;
      --text-dim:      #3d6080;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .logo-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(14,165,233,.35);
    }

    .logo-name {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #e0f2ff, var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .logo-sub {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all .2s;
    }

    .form-input::placeholder {
      color: var(--text-dim);
    }

    .form-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(14,165,233,.12);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      margin-top: 8px;
      box-shadow: 0 4px 18px rgba(14,165,233,.3);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(14,165,233,.45);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .links {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      margin: 0 12px;
      transition: color .2s;
    }

    .link:hover {
      color: var(--secondary);
    }

    .error-message {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.2);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message {
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.2);
      color: var(--success);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .spin {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: rot .6s linear infinite;
      display: inline-block;
      margin-right: 8px;
    }

    @keyframes rot {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 24px;
        margin: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon">🏥</div>
      <div class="logo-name">MediConnect</div>
      <div class="logo-sub">Healthcare Management System</div>
    </div>

    <div id="errorMessage" class="error-message"></div>
    <div id="successMessage" class="success-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
      </div>

      <button type="submit" id="loginBtn" class="btn">
        <span id="btnText">Sign In</span>
      </button>
    </form>

    <div class="links">
      <a href="patient-signup.html" class="link">Patient Registration</a>
    </div>
  </div>

  <script>
    const API_USER = 'https://healthcare-7pwe.onrender.com';

    // Utility functions
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      successDiv.style.display = 'none';
    }

    function showSuccess(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      successDiv.textContent = message;
      successDiv.style.display = 'block';
      errorDiv.style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('errorMessage').style.display = 'none';
      document.getElementById('successMessage').style.display = 'none';
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      const btnText = document.getElementById('btnText');

      if (loading) {
        btn.disabled = true;
        btnText.innerHTML = '<span class="spin"></span>Signing In...';
      } else {
        btn.disabled = false;
        btnText.textContent = 'Sign In';
      }
    }

    // Login function
    async function login(username, password) {
      try {
        const response = await fetch(`${API_USER}/api/users/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          // Store token and user info in localStorage
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('role', data.role);

          showSuccess('Login successful! Redirecting...');

          // Redirect based on role
          setTimeout(() => {
            if (data.role === 'ADMIN') {
              window.location.href = 'doctor-registration.html';
            } else {
              window.location.href = 'user-profile.html';
            }
          }, 1500);
        } else {
          showError(data.message || 'Login failed');
        }
      } catch (error) {
        showError('Network error. Please try again.');
        console.error('Login error:', error);
      }
    }

    // Form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please fill in all fields');
        return;
      }

      setLoading(true);
      await login(username, password);
      setLoading(false);
    });

    // Check if already logged in
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (token) {
        // Redirect to appropriate page
        const role = localStorage.getItem('role');
        if (role === 'ADMIN') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'user-profile.html';
        }
      }
    });
  </script>
</body>
</html>
